<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopNow - Password Dimenticata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="initially-hidden">
    <header class="amazon-header">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="fas fa-shopping-bag me-2"></i>ShopNow</a>
        </div>
    </header>

    <main class="auth-main">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="auth-card">
                        <div class="auth-header">
                            <h3><i class="fas fa-unlock-alt me-2"></i>Recupero Password</h3>
                            <p>Inserisci il tuo indirizzo email e ti invieremo un link sicuro per reimpostare la tua password.</p>
                        </div>
                        <div class="auth-body">
                            <div id="forgot-message" class="alert d-none mb-3"></div>
                            <form id="forgot-password-form">
                                <div class="mb-4">
                                    <label class="form-label">Indirizzo Email</label>
                                    <input type="email" id="forgot-email" class="form-control" placeholder="esempio@mail.com" required>
                                </div>
                                <button type="submit" id="submit-btn" class="btn btn-amazon w-100 py-2 fw-bold">Invia istruzioni di reset</button>
                            </form>
                            <div class="auth-links">
                                <p class="mb-0">Ti sei ricordato la password? <a href="index.html">Torna al login</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="amazon-footer">
        <div class="container text-center">
            <p class="small text-muted">&copy; 2026 ShopNow. Tutti i diritti riservati.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script src="forgot_password_ui.js"></script>
</body>
</html>
