<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopNow - Reimposta Password</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body class="initially-hidden">
    <header class="amazon-header">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html"
          ><i class="fas fa-shopping-bag me-2"></i>ShopNow</a
        >
      </div>
    </header>

    <main class="auth-main">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6">
            <div class="auth-card">
              <div class="auth-header">
                <h3><i class="fas fa-key me-2"></i>Reimposta Password</h3>
                <p>
                  Inserisci la tua nuova password sicura per accedere nuovamente
                  al tuo account.
                </p>
              </div>
              <div class="auth-body">
                <div id="reset-message" class="alert d-none mb-3"></div>
                <form id="reset-password-form">
                  <div class="mb-4">
                    <label class="form-label">Nuova Password</label>
                    <div class="input-group">
                      <input
                        type="password"
                        id="new-password"
                        class="form-control"
                        placeholder="Inserisci la nuova password"
                        required
                      />
                      <button
                        class="btn btn-outline-secondary"
                        type="button"
                        id="toggle-new-password"
                      >
                        <i class="fas fa-eye"></i>
                      </button>
                    </div>
                    <div class="form-text">
                      Usa una combinazione di lettere e numeri.
                    </div>
                  </div>
                  <div class="mb-4">
                    <label class="form-label">Conferma Nuova Password</label>
                    <div class="input-group">
                      <input
                        type="password"
                        id="confirm-password"
                        class="form-control"
                        placeholder="Ripeti la password"
                        required
                      />
                      <button
                        class="btn btn-outline-secondary"
                        type="button"
                        id="toggle-confirm-password"
                      >
                        <i class="fas fa-eye"></i>
                      </button>
                    </div>
                  </div>
                  <button
                    type="submit"
                    class="btn btn-amazon w-100 py-2 fw-bold"
                  >
                    Aggiorna Password
                  </button>
                </form>
                <div class="auth-links">
                  <p class="mb-0">
                    Hai ricordato la password?
                    <a href="index.html">Torna al login</a>
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="amazon-footer">
      <div class="container text-center">
        <p class="small text-muted">
          &copy; 2026 ShopNow. Tutti i diritti riservati.
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js?v=20260426"></script>
    <script src="reset_password_ui.js"></script>
  </body>
</html>
