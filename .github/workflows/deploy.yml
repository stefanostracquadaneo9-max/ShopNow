# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_PROJECT_ID: "${{ vars.RAILWAY_PROJECT_ID }}"
      RAILWAY_ENVIRONMENT: "${{ vars.RAILWAY_ENVIRONMENT }}"
      RAILWAY_SERVICE: "${{ vars.RAILWAY_SERVICE }}"
      RAILWAY_TOKEN: "${{ secrets.RAILWAY_TOKEN }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: npm install --global @railway/cli

      - name: Skip Railway CLI deploy
        if: ${{ env.RAILWAY_TOKEN == '' }}
        run: echo "RAILWAY_TOKEN secret is not configured; Railway GitHub integration will handle deploys."

      - name: Deploy to Railway
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: |
          project_id="${RAILWAY_PROJECT_ID:-4f69a0a3-1d8b-4806-bca3-1d8eaf51e272}"
          environment_name="${RAILWAY_ENVIRONMENT:-production}"
          service_name="${RAILWAY_SERVICE:-ShopNow}"

          command=(railway up --ci --project "$project_id" --environment "$environment_name" --service "$service_name")

          "${command[@]}"
